syntax = "proto3";
package openOBD.v1;
option java_package = "com.jifeline.OpenOBD.Logging";
option java_multiple_files = true;

import "v1/Logging/Messages/LogMessage.proto";
import "v1/Messages/Empty.proto";

/* Service for logging information to the ScriptLog interface in the dashboard */
service logging {
  /*
   The `openLogStream(stream LogMessage)` message allows sending log messages to the ScriptLog
   interface in the dashboard. This could be used for information about progress or debugging
   statements. More interactive communication with the operator can be done with the `userInterface` service.
   */
  rpc openLogStream(stream LogMessage) returns (EmptyMessage) {}

}

